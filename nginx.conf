server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Service worker: mai in cache, il browser deve poterlo ricontrollare ad ogni load
    # per far arrivare gli aggiornamenti della PWA senza attese.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Asset con hash nel nome (JS/CSS generati da Vite): cache lunga e immutabile.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Suoni di default e icone: cache lunga ma revalidabile.
    location ~* \.(?:wav|mp3|png|svg|ico)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Fallback SPA: qualsiasi rotta non trovata serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /index.html;
}
