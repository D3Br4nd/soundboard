server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Consente l'upload di file audio verso l'API (limite multer: 20MB).
    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Backend condiviso: elenco/upload/modifica/eliminazione suoni, persistiti
    # su volume Docker e visibili da qualsiasi dispositivo.
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker: mai in cache, il browser deve poterlo ricontrollare ad ogni load
    # per far arrivare gli aggiornamenti della PWA senza attese.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Asset con hash nel nome (JS/CSS generati da Vite): cache lunga e immutabile.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Icone statiche: cache lunga ma revalidabile. I file audio sono serviti
    # dall'API (/api/sounds/:id/audio.:ext), non piu' come asset statici qui.
    location ~* \.(?:png|svg|ico)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Fallback SPA: qualsiasi rotta non trovata serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /index.html;
}
